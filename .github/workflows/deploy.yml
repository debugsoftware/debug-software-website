name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        type: choice
        options:
          - staging
          - production
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-manual:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Get latest version tag
        id: version
        run: |
          TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "latest")
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploy ${{ inputs.environment }} - v${{ steps.version.outputs.tag }} ==="

            # Login no GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull da imagem
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

            # Deploy com docker-compose
            cd /opt/debug-software-website/${{ inputs.environment }} || mkdir -p /opt/debug-software-website/${{ inputs.environment }}

            cat > docker-compose.yml << 'COMPOSE'
            services:
              web:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
                container_name: debug-software-website-${{ inputs.environment }}
                restart: unless-stopped
                networks:
                  - traefik-network
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.debug-website-${{ inputs.environment }}.rule=Host(`${{ vars.DOMAIN }}`)"
                  - "traefik.http.routers.debug-website-${{ inputs.environment }}.entrypoints=websecure"
                  - "traefik.http.routers.debug-website-${{ inputs.environment }}.tls.certresolver=letsencrypt"
                  - "traefik.http.services.debug-website-${{ inputs.environment }}.loadbalancer.server.port=80"
                  - "traefik.http.routers.debug-website-${{ inputs.environment }}-http.rule=Host(`${{ vars.DOMAIN }}`)"
                  - "traefik.http.routers.debug-website-${{ inputs.environment }}-http.entrypoints=web"
                  - "traefik.http.routers.debug-website-${{ inputs.environment }}-http.middlewares=redirect-to-https-${{ inputs.environment }}"
                  - "traefik.http.middlewares.redirect-to-https-${{ inputs.environment }}.redirectscheme.scheme=https"
                  - "traefik.http.middlewares.redirect-to-https-${{ inputs.environment }}.redirectscheme.permanent=true"
            networks:
              traefik-network:
                external: true
            COMPOSE

            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d

            # Cleanup de imagens antigas
            docker image prune -f

            echo "=== Deploy ${{ inputs.environment }} concluído! ==="

  deploy-auto-production:
    name: Auto Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Get latest version tag
        id: version
        run: |
          TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "latest")
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Production VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Auto Deploy Production - v${{ steps.version.outputs.tag }} ==="

            # Login no GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull da imagem
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

            # Deploy com docker-compose
            mkdir -p /opt/debug-software-website/production
            cd /opt/debug-software-website/production

            cat > docker-compose.yml << 'COMPOSE'
            services:
              web:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
                container_name: debug-software-website-production
                restart: unless-stopped
                networks:
                  - traefik-network
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.debug-website-production.rule=Host(`${{ vars.DOMAIN }}`)"
                  - "traefik.http.routers.debug-website-production.entrypoints=websecure"
                  - "traefik.http.routers.debug-website-production.tls.certresolver=letsencrypt"
                  - "traefik.http.services.debug-website-production.loadbalancer.server.port=80"
                  - "traefik.http.routers.debug-website-production-http.rule=Host(`${{ vars.DOMAIN }}`)"
                  - "traefik.http.routers.debug-website-production-http.entrypoints=web"
                  - "traefik.http.routers.debug-website-production-http.middlewares=redirect-to-https-production"
                  - "traefik.http.middlewares.redirect-to-https-production.redirectscheme.scheme=https"
                  - "traefik.http.middlewares.redirect-to-https-production.redirectscheme.permanent=true"
            networks:
              traefik-network:
                external: true
            COMPOSE

            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d

            # Cleanup de imagens antigas
            docker image prune -f

            echo "=== Auto Deploy Production concluído! ==="
