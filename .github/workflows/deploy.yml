name: Production deploy

on:
  pull_request:
    paths:
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Digite deploy-production para confirmar"
        required: true
        type: string

permissions:
  contents: read

env:
  COMPOSE_FILE: deploy/production/docker-compose.yml
  IMAGE: ghcr.io/debugsoftware/debug-software-website:1.2.0
  REMOTE_HOST: srv723452
  REMOTE_USER: rodrigo
  REMOTE_DIR: /opt/docker/debug-software-website
  REMOTE_COMPOSE: /opt/docker/debug-software-website/docker-compose.yml

jobs:
  validate-compose:
    name: Validate production Compose
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate Compose syntax
        run: docker compose -f "${COMPOSE_FILE}" config --quiet

      - name: Validate production constraints
        shell: bash
        run: |
          set -euo pipefail

          config_file="${RUNNER_TEMP}/production-compose.json"
          docker compose -f "${COMPOSE_FILE}" config --format json > "${config_file}"

          python3 - "${config_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as config_file:
              config = json.load(config_file)

          errors = []
          services = config.get("services", {})
          website = services.get("website", {})
          labels = website.get("labels", {})
          networks = website.get("networks", {})
          proxy = config.get("networks", {}).get("proxy", {})

          image = website.get("image", "")
          if image.rsplit(":", 1)[-1] == "latest":
              errors.append("a imagem não pode usar a tag latest")
          if image != "ghcr.io/debugsoftware/debug-software-website:1.2.0":
              errors.append("a imagem deve estar fixada na versão 1.2.0")
          if website.get("ports"):
              errors.append("o serviço website não pode publicar portas no host")
          if set(services) != {"website"}:
              errors.append("website deve ser o único serviço declarado")
          if set(networks) != {"proxy"}:
              errors.append("website deve estar conectado somente à rede proxy")
          if proxy.get("external") is not True:
              errors.append("a rede proxy deve ser externa")

          expected_labels = {
              "traefik.enable": "true",
              "traefik.docker.network": "proxy",
              "traefik.http.routers.debug-software-website.rule": "Host(`www.debugsoftware.com.br`)",
              "traefik.http.routers.debug-software-website.entrypoints": "websecure",
              "traefik.http.routers.debug-software-website.tls": "true",
              "traefik.http.routers.debug-software-website.tls.certresolver": "letsencrypt",
              "traefik.http.services.debug-software-website.loadbalancer.server.port": "80",
              "traefik.http.routers.debug-software-website-apex.rule": "Host(`debugsoftware.com.br`)",
              "traefik.http.routers.debug-software-website-apex.entrypoints": "websecure",
              "traefik.http.routers.debug-software-website-apex.tls": "true",
              "traefik.http.routers.debug-software-website-apex.tls.certresolver": "letsencrypt",
              "traefik.http.routers.debug-software-website-apex.middlewares": "debug-software-website-apex-to-www",
              "traefik.http.middlewares.debug-software-website-apex-to-www.redirectregex.regex": "^https?://debugsoftware[.]com[.]br/(.*)",
              "traefik.http.middlewares.debug-software-website-apex-to-www.redirectregex.replacement": "https://www.debugsoftware.com.br/$${1}",
              "traefik.http.middlewares.debug-software-website-apex-to-www.redirectregex.permanent": "true",
          }
          for label, expected_value in expected_labels.items():
              if labels.get(label) != expected_value:
                  errors.append(f"label inválida: {label}")

          if errors:
              raise SystemExit("\n".join(f"- {error}" for error in errors))
          PY

  deploy-production:
    name: Deploy production via Tailscale
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      inputs.confirm == 'deploy-production'
    needs: validate-compose
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    concurrency:
      group: debug-software-website-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Pull and inspect the private image on the runner
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set -euo pipefail

          docker_config="${RUNNER_TEMP}/docker-config-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          install -d -m 0700 "${docker_config}"

          printf '%s' "${GHCR_TOKEN}" | docker --config "${docker_config}" login ghcr.io \
            --username "${GHCR_USERNAME}" --password-stdin >/dev/null
          docker --config "${docker_config}" pull --platform linux/amd64 "${IMAGE}"

          repo_digest=$(docker image inspect --format '{{index .RepoDigests 0}}' "${IMAGE}")
          image_digest=${repo_digest#*@}
          image_os=$(docker image inspect --format '{{.Os}}' "${IMAGE}")
          image_architecture=$(docker image inspect --format '{{.Architecture}}' "${IMAGE}")

          case "${image_digest}" in
            sha256:*) ;;
            *)
              printf 'Digest de imagem inválido.\n' >&2
              exit 1
              ;;
          esac
          test "${image_os}" = linux
          test "${image_architecture}" = amd64

          printf 'image_digest=%s\n' "${image_digest}"
          printf 'image_os=%s\n' "${image_os}"
          printf 'image_architecture=%s\n' "${image_architecture}"

      - name: Connect to the private Tailscale network
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          hostname: debug-website-deploy-${{ github.run_id }}
          ping: srv723452
          version: 1.94.2

      - name: Prepare ephemeral SSH credentials
        shell: bash
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -d -m 0700 "${RUNNER_TEMP}/ssh"
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > "${RUNNER_TEMP}/ssh/deploy_key"
          printf '%s\n' "${VPS_SSH_KNOWN_HOSTS}" > "${RUNNER_TEMP}/ssh/known_hosts"
          chmod 0600 "${RUNNER_TEMP}/ssh/deploy_key" "${RUNNER_TEMP}/ssh/known_hosts"

      - name: Verify private remote access
        shell: bash
        run: |
          set -euo pipefail

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )

          ssh "${ssh_options[@]}" "${REMOTE_USER}@${REMOTE_HOST}" \
            'test "$(id -un)" = rodrigo && docker info >/dev/null && test -w /opt/docker'

      - name: Install Compose with a unique backup
        id: install-compose
        shell: bash
        run: |
          set -euo pipefail

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )
          target="${REMOTE_USER}@${REMOTE_HOST}"
          remote_tmp="${REMOTE_COMPOSE}.pending.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          remote_backup="${REMOTE_COMPOSE}.backup.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          remote_state="${REMOTE_DIR}/.deploy.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.state"

          cleanup_compose() {
            ssh "${ssh_options[@]}" "${target}" "rm -f -- '${remote_tmp}'" >/dev/null 2>&1 || true
          }
          trap cleanup_compose EXIT

          ssh "${ssh_options[@]}" "${target}" \
            "mkdir -p '${REMOTE_DIR}' && test -w '${REMOTE_DIR}' && test ! -e '${remote_backup}' && test ! -e '${remote_state}'"
          scp "${ssh_options[@]}" "${COMPOSE_FILE}" "${target}:${remote_tmp}"
          ssh "${ssh_options[@]}" "${target}" "bash -s" -- \
            "${remote_tmp}" "${REMOTE_COMPOSE}" "${remote_backup}" "${remote_state}" <<'REMOTE'
          set -eu
          pending=$1
          compose=$2
          backup=$3
          state=$4

          docker compose -f "${pending}" config --quiet
          if test -f "${compose}"; then
            cp -p -- "${compose}" "${backup}"
            printf 'previous\n' > "${state}"
          else
            printf 'first\n' > "${state}"
          fi
          mv -- "${pending}" "${compose}"
          REMOTE

          trap - EXIT
          printf 'installed=true\n' >> "${GITHUB_OUTPUT}"

      - name: Transfer the image without registry credentials
        shell: bash
        run: |
          set -euo pipefail

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )

          docker save "${IMAGE}" | gzip -1 | \
            ssh "${ssh_options[@]}" "${REMOTE_USER}@${REMOTE_HOST}" 'gunzip | docker load'

      - name: Start only the website service
        shell: bash
        run: |
          set -euo pipefail

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )

          ssh "${ssh_options[@]}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "docker compose -f '${REMOTE_COMPOSE}' up -d --no-deps --pull never --wait --wait-timeout 120 website"

      - name: Verify the origin router and certificate
        shell: bash
        run: |
          set -euo pipefail

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )

          ssh "${ssh_options[@]}" "${REMOTE_USER}@${REMOTE_HOST}" '
            set -e
            for attempt in $(seq 1 18); do
              if curl --fail --silent --show-error --connect-timeout 5 --max-time 15 \
                --resolve www.debugsoftware.com.br:443:127.0.0.1 \
                https://www.debugsoftware.com.br/ --output /dev/null; then
                redirect_target=$(curl --silent --show-error --connect-timeout 5 --max-time 15 \
                  --resolve debugsoftware.com.br:443:127.0.0.1 \
                  https://debugsoftware.com.br/deploy-verification \
                  --output /dev/null --write-out "%{redirect_url}" || true)
                if test "${redirect_target}" = \
                  "https://www.debugsoftware.com.br/deploy-verification"; then
                  docker compose -f /opt/docker/debug-software-website/docker-compose.yml ps website
                  exit 0
                fi
              fi
              sleep 10
            done
            exit 1
          '

      - name: Remove the completed deployment state
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )
          remote_state="${REMOTE_DIR}/.deploy.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.state"

          ssh "${ssh_options[@]}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "rm -f -- '${remote_state}'"

      - name: Roll back a failed deployment
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          if ! test -s "${RUNNER_TEMP}/ssh/deploy_key" || \
            ! test -s "${RUNNER_TEMP}/ssh/known_hosts"; then
            printf 'Rollback remoto não necessário: credenciais SSH não foram preparadas.\n'
            exit 0
          fi

          ssh_options=(
            -i "${RUNNER_TEMP}/ssh/deploy_key"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${RUNNER_TEMP}/ssh/known_hosts"
          )
          target="${REMOTE_USER}@${REMOTE_HOST}"
          remote_backup="${REMOTE_COMPOSE}.backup.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          remote_failed="${REMOTE_COMPOSE}.failed.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          remote_state="${REMOTE_DIR}/.deploy.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.state"

          if ! ssh "${ssh_options[@]}" "${target}" "test -f '${remote_state}'"; then
            printf 'Rollback remoto não necessário: nenhum estado desta execução foi encontrado.\n'
            exit 0
          fi

          ssh "${ssh_options[@]}" "${target}" "bash -s" -- \
            "${REMOTE_COMPOSE}" "${remote_backup}" "${remote_failed}" "${remote_state}" <<'REMOTE'
          set -eu
          compose=$1
          backup=$2
          failed=$3
          state=$4

          mode=$(cat "${state}")
          test ! -e "${failed}"
          if test -f "${compose}"; then
            mv -- "${compose}" "${failed}"
          fi

          case "${mode}" in
            previous)
              test -f "${backup}"
              cp -p -- "${backup}" "${compose}"
              docker compose -f "${compose}" up -d --no-deps --pull never \
                --force-recreate --wait --wait-timeout 120 website
              docker compose -f "${compose}" ps website
              ;;
            first)
              test -f "${failed}"
              docker compose -f "${failed}" stop website || true
              docker compose -f "${failed}" rm -f website || true
              remaining_containers=$(docker compose -f "${failed}" ps --all \
                --quiet website)
              if test -n "${remaining_containers}"; then
                printf 'Rollback incompleto: container do serviço website permanece.\n' >&2
                docker compose -f "${failed}" ps --all website >&2
                exit 1
              fi
              printf 'Rollback confirmado: nenhum container website permanece.\n'
              ;;
            *)
              printf 'Estado de rollback inválido.\n' >&2
              exit 1
              ;;
          esac
          REMOTE

      - name: Remove temporary runner credentials
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          docker_config="${RUNNER_TEMP}/docker-config-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          case "${docker_config}" in
            "${RUNNER_TEMP}"/docker-config-*) rm -rf -- "${docker_config}" ;;
            *)
              printf 'Diretório Docker temporário inesperado.\n' >&2
              exit 1
              ;;
          esac
          rm -f -- "${RUNNER_TEMP}/ssh/deploy_key" "${RUNNER_TEMP}/ssh/known_hosts"
