name: Validate production Compose

on:
  pull_request:
    paths:
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate production Compose
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose syntax
        run: docker compose -f deploy/production/docker-compose.yml config --quiet

      - name: Validate production constraints
        shell: bash
        run: |
          set -euo pipefail

          config_file="${RUNNER_TEMP}/production-compose.json"
          docker compose -f deploy/production/docker-compose.yml config --format json > "${config_file}"

          python3 - "${config_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as config_file:
              config = json.load(config_file)

          errors = []
          services = config.get("services", {})
          website = services.get("website", {})
          labels = website.get("labels", {})
          networks = website.get("networks", {})
          proxy = config.get("networks", {}).get("proxy", {})

          image = website.get("image", "")
          if image.rsplit(":", 1)[-1] == "latest":
              errors.append("a imagem não pode usar a tag latest")
          if image != "ghcr.io/debugsoftware/debug-software-website:1.2.0":
              errors.append("a imagem deve estar fixada na versão 1.2.0")
          if website.get("ports"):
              errors.append("o serviço website não pode publicar portas no host")
          if set(services) != {"website"}:
              errors.append("website deve ser o único serviço declarado")
          if set(networks) != {"proxy"}:
              errors.append("website deve estar conectado somente à rede proxy")
          if proxy.get("external") is not True:
              errors.append("a rede proxy deve ser externa")
          if labels.get("traefik.enable") != "true":
              errors.append("o serviço deve estar habilitado no Traefik")
          if labels.get("traefik.docker.network") != "proxy":
              errors.append("traefik.docker.network deve apontar para proxy")
          if labels.get("traefik.http.routers.debug-software-website.rule") != "Host(`www.debugsoftware.com.br`)":
              errors.append("o domínio do router está incorreto")
          if labels.get("traefik.http.routers.debug-software-website.entrypoints") != "websecure":
              errors.append("o entrypoint do router deve ser websecure")
          if labels.get("traefik.http.routers.debug-software-website.tls") != "true":
              errors.append("o TLS do router deve estar habilitado")
          if labels.get("traefik.http.routers.debug-software-website.tls.certresolver") != "letsencrypt":
              errors.append("o resolver ACME deve ser letsencrypt")
          if labels.get("traefik.http.services.debug-software-website.loadbalancer.server.port") != "80":
              errors.append("a porta interna do serviço Traefik deve ser 80")

          if errors:
              raise SystemExit("\n".join(f"- {error}" for error in errors))
          PY
